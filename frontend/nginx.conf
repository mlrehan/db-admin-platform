# Frontend nginx config (included within the http{} context via conf.d/).
# Serves the static SPA and reverse-proxies the API + WebSocket to the backend service.

# Map for WebSocket upgrade (Connection header).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream api_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API + WebSocket. The same /api/ prefix covers REST and the /api/v1/ws/... endpoint;
    # the upgrade headers make the WebSocket handshake pass through.
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Vendored libraries: cache aggressively (content-addressed by version).
    location /vendor/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # App shell: never cache index.html / config.js so deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /config.js {
        add_header Cache-Control "no-cache";
    }

    # SPA: fall back to index.html (hash routing means this is mostly a safety net).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
