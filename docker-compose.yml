# Enterprise DB Admin Platform — full stack.
#   docker compose up --build
#
# Services:
#   postgres  — control-plane database (platform's own state; NOT a target database)
#   backend   — FastAPI app; runs migrations + admin bootstrap on start
#   frontend  — nginx serving the SPA and proxying /api + /ws to the backend
#
# Copy .env.example to .env and set the secrets before starting.

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CONTROL_DB_USER:-dbadmin}
      POSTGRES_PASSWORD: ${CONTROL_DB_PASSWORD}
      POSTGRES_DB: ${CONTROL_DB_NAME:-db_admin_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal


  # =========================
  # MSSQL (CHANGED PORT!)
  # =========================
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-db
    restart: unless-stopped

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Strong@12345}

    ports:
      - "15333:1433"

    volumes:
      - mssql_data:/var/opt/mssql
      - mssql_backup:/var/opt/mssql/backup

    networks:
      - internal


  # =========================
  # MYSQL (NEW)
  # =========================
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Root@12345}
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: App@12345

    ports:
      - "3307:3306"   # 🔥 host port changed

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - internal


  backend:
    build: ./backend
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_started
      mssql:
        condition: service_started
      mysql:
        condition: service_started

    environment:
      APP_ENVIRONMENT: production
      CONTROL_DB_HOST: postgres
      CONTROL_DB_PORT: "5432"
      CONTROL_DB_USER: ${CONTROL_DB_USER:-dbadmin}
      CONTROL_DB_PASSWORD: ${CONTROL_DB_PASSWORD}
      CONTROL_DB_NAME: ${CONTROL_DB_NAME:-db_admin_platform}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:?set SECURITY_JWT_SECRET in .env}
      SECURITY_MASTER_ENCRYPTION_KEY: ${SECURITY_MASTER_ENCRYPTION_KEY:?set SECURITY_MASTER_ENCRYPTION_KEY in .env}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:8080}
      LOG_FORMAT: json
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}

      # MSSQL (IMPORTANT: internal port stays 1433)
      MSSQL_HOST: mssql
      MSSQL_PORT: "1433"
      MSSQL_USER: sa
      MSSQL_PASSWORD: ${MSSQL_SA_PASSWORD:-Strong@12345}

      # MYSQL
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: app_user
      MYSQL_PASSWORD: App@12345
      MYSQL_DATABASE: app_db

    ports:
      - "8000:8000"

    networks:
      - internal


  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - internal


volumes:
  pgdata:
  mssql_data:
  mssql_backup:
  mysql_data:


networks:
  internal:
    driver: bridge
